<div id="container">
  <p><strong>App de gatos!</strong></p>

  <div class="search-area">
    <p>Buscar gatos</p>

    <div class="search-row">
      <ion-input
        [(ngModel)]="tagInput"
        placeholder="Criterio de búsqueda">
      </ion-input>

      <ion-button class="search-btn" (click)="reloadCatsDefault()">
        <ion-icon name="search-outline"></ion-icon>
      </ion-button>
    </div>
  </div>

  <div class="cat-count">
    Gato {{ catPosition + 1 }} de {{ catArray.length }}
  </div>

  <div class="cat-card">
    <div class="cat-viewer">
      <ion-button class="nav-btn" fill="outline" (click)="leftCat()">
        ←
      </ion-button>

      <img
        class="responsive-img"
        [src]="getCurrentCat().url"
        alt="Foto gato" />

      <ion-button class="nav-btn" fill="outline" (click)="rightCat()">
        →
      </ion-button>
    </div>

    <p class="tags">
      <strong>Tags:</strong>
      {{ getCurrentCat().tags.join(', ') || 'Sin tags disponibles' }}
    </p>

    <ion-button
      expand="block"
      class="random-btn"
      (click)="getRandomCat()">
      Cargar gato aleatorio
    </ion-button>
  </div>
</div>
